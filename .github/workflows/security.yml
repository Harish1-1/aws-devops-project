name: DevSecOps Security Scans

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "15 2 * * 1"

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  secrets:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Semgrep
        run: python -m pip install --disable-pip-version-check semgrep

      - name: Run Semgrep
        run: semgrep scan --config auto --error --metrics=off .

  checkov:
    name: Checkov IaC Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Checkov
        run: python -m pip install --disable-pip-version-check checkov

      - name: Scan Terraform, Kubernetes, Dockerfiles and workflows
        run: |
          checkov -d . \
            --framework terraform kubernetes dockerfile github_actions \
            --compact \
            --soft-fail
        # Remove --soft-fail after you remediate or formally suppress accepted findings.

  trivy-filesystem:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Scan repository dependencies and secrets
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0" # Change to "1" when you are ready to enforce the gate.
